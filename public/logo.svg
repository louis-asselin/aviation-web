<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g2a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#85C1E9" />
      <stop offset="100%" style="stop-color:#3498DB" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#g2a)"/>
  <!-- Abstract wing / book shape -->
  <g transform="translate(256,220)">
    <!-- Left wing/page -->
    <path d="M-10,0 C-40,-60 -120,-80 -150,-40 C-130,-55 -60,-50 -10,-10Z" fill="white" opacity="0.95"/>
    <!-- Right wing/page -->
    <path d="M10,0 C40,-60 120,-80 150,-40 C130,-55 60,-50 10,-10Z" fill="white" opacity="0.95"/>
    <!-- Center line -->
    <line x1="0" y1="-5" x2="0" y2="30" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <!-- Small plane dot -->
    <circle cx="0" cy="-60" r="6" fill="white"/>
    <!-- Trail -->
    <path d="M0,-55 L0,-10" stroke="white" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
  </g>
  <text x="256" y="350" text-anchor="middle" font-family="Helvetica Neue,Arial" font-weight="700" font-size="38" fill="white" letter-spacing="2">Aviation</text>
  <text x="256" y="390" text-anchor="middle" font-family="Helvetica Neue,Arial" font-weight="300" font-size="26" fill="white" letter-spacing="5" opacity="0.75">Learning</text>
</svg>
